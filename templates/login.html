<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_name }} · 登录</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* ── 登录页局部样式（组长负责）──  */
    body { background: #f4f6fb; }
    .login-wrap {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
      padding: 40px 36px 36px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo h1 {
      font-size: 1.6rem;
      color: #4f46e5;
      margin: 0 0 4px;
    }
    .login-logo p {
      font-size: 0.88rem;
      color: #6b7280;
      margin: 0;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s;
    }
    .btn-login:hover { background: #4338ca; }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 14px;
    }
    .login-tip {
      text-align: center;
      font-size: 0.82rem;
      color: #9ca3af;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <h1>{{ site_name }}</h1>
    <p>{{ site_slogan }}</p>
  </div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username"
             placeholder="请输入用户名" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password"
             placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn-login">登 录</button>
  </form>

  <p class="login-tip">{{ login_tip }}</p>
</div>

</body>
</html>
